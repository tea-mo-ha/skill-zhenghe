interface:
  display_name: "Skill Suite Orchestrator"
  short_description: "统一入口总控 skill，按最小必要集调度本工程子 skills。"
  default_prompt: >-
    Route this task through skill-suite-orchestrator, choose only the minimal
    downstream subskills, normalize the final chosen_subskills against
    references/route-profiles.yaml before output for governed scenarios, never
    include skill-suite-orchestrator itself in chosen_subskills, read every
    selected child SKILL.md before execution without bypasses, output
    skill_file_reads and routing_context, and keep skill_file_reads limited to
    real child SKILL.md paths only (never list skill-suite-orchestrator/SKILL.md,
    routing-matrix.md, skill-inventory.md, or any other routing input). For
    architecture analysis, including minimal route validation, dry runs, or
    brief-plan requests, always keep spec-driven-development,
    api-and-interface-design, and planning-and-task-breakdown in that order
    unless the repository clearly lacks any spec/interface/design surface. Only
    select platform-native skills when the live runtime inventory actually
    exposes them, never use plugin-owned or external skills unless the user
    explicitly asks, and then continue with plan, execution, and validation.
